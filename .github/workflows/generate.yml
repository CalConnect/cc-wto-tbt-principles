name: generate

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  site:
    uses: actions-mn/.github/.github/workflows/metanorma-generate.yml@v1
    secrets: inherit
